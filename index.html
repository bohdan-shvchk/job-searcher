<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236c63ff'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white'>V</text></svg>">
<title>Вакансії</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #141420;
    --panel: #0e0e1a;
    --border: #252538;
    --text: #e0e0e0;
    --muted: #777;
    --accent: #6c63ff;
    --link: #74b9ff;
    --danger: #ff4757;
    --danger-bg: rgba(255,71,87,.1);
    --green: #2ed573;
    --yellow: #ffa502;
    --red: #ff4757;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    padding-bottom: 60px;
    max-width: 800px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  header { text-align: center; padding: 16px 0 4px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .meta { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

  .top-actions { display: flex; justify-content: flex-end; padding: 6px 0 0; }
  .export-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.68rem; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; transition: all .2s;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Score filters */
  .filter-group-label { color: var(--muted); font-size: 0.65rem; padding: 10px 0 2px; }
  .filters {
    display: flex; gap: 6px; padding: 4px 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.72rem; padding: 5px 10px;
    border-radius: 16px; white-space: nowrap; cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Status filters */
  .status-filters {
    display: flex; gap: 6px; padding: 4px 0 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .status-filters::-webkit-scrollbar { display: none; }
  .sf-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.72rem; padding: 5px 10px;
    border-radius: 16px; white-space: nowrap; cursor: pointer;
    transition: all .2s;
  }
  .sf-btn.active { color: #fff; }
  .sf-btn[data-sf="all"].active          { background: var(--accent); border-color: var(--accent); }
  .sf-btn[data-sf="new"].active          { background: #00a8ff; border-color: #00a8ff; }
  .sf-btn[data-sf="applied"].active      { background: #a29bfe; border-color: #a29bfe; }
  .sf-btn[data-sf="interview"].active    { background: var(--yellow); border-color: var(--yellow); color: #111; }
  .sf-btn[data-sf="rejected"].active     { background: var(--red); border-color: var(--red); }
  .sf-btn[data-sf="not_suitable"].active { background: var(--muted); border-color: var(--muted); }
  .sf-btn-add {
    background: transparent; border: 1px dashed var(--border);
    color: var(--muted); font-size: 0.8rem; padding: 4px 9px;
    border-radius: 16px; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .sf-btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .sf-btn-custom {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .sf-btn-del {
    font-size: 0.65rem; opacity: 0; transition: opacity .15s;
    background: none; border: none; cursor: pointer;
    color: inherit; padding: 0; line-height: 1;
  }
  .sf-btn:hover .sf-btn-del { opacity: 1; }

  /* Sort controls */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0 2px; gap: 8px;
  }
  .sort-group { display: flex; gap: 4px; align-items: center; }
  .sort-label { color: var(--muted); font-size: 0.68rem; margin-right: 2px; }
  .sort-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.68rem; padding: 3px 8px;
    border-radius: 4px; cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sort-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  .search-box {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 0.75rem; padding: 4px 10px;
    border-radius: 6px; outline: none; width: 160px; transition: border-color .2s;
  }
  .search-box::placeholder { color: var(--muted); }
  .search-box:focus { border-color: var(--accent); }

  .section { margin-top: 18px; }
  .section-hdr {
    font-size: 0.9rem; font-weight: 600; color: var(--accent);
    padding: 6px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
  }
  .section-count {
    background: var(--border); color: var(--muted);
    font-size: 0.65rem; padding: 2px 7px; border-radius: 10px;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px; overflow: hidden;
  }
  .card-header {
    padding: 12px; display: flex; align-items: flex-start;
    gap: 10px; cursor: pointer; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .card-header:active { background: rgba(255,255,255,.02); }

  .score-badge {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700;
  }
  .score-high { background: rgba(46,213,115,.2); color: var(--green); }
  .score-mid  { background: rgba(255,165,2,.2);  color: var(--yellow); }
  .score-low  { background: rgba(255,71,87,.15); color: var(--red); }
  .score-none { background: var(--border);       color: var(--muted); }

  .card-info { flex: 1; min-width: 0; padding-right: 36px; }
  .card-title {
    color: var(--link); text-decoration: none;
    font-size: 0.85rem; line-height: 1.3; display: block; word-wrap: break-word;
  }
  .card-title:hover { text-decoration: underline; }

  .card-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 5px; font-size: 0.68rem; color: var(--muted);
  }
  .tag { background: var(--border); padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
  .tag-date     { background: rgba(108,99,255,.15); color: var(--accent); }
  .tag-inactive { color: var(--red); background: var(--danger-bg); }
  .tag-salary   { background: rgba(46,213,115,.12); color: var(--green); }
  .tag-seen-new {
    background: rgba(0,168,255,.2); color: #00a8ff;
    font-weight: 600; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

  /* Vacancy status badge */
  .vstatus {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.65rem; padding: 1px 7px; border-radius: 4px;
    font-weight: 600; white-space: nowrap; cursor: default;
  }
  .vstatus-new          { background: rgba(0,168,255,.15);  color: #00a8ff; }
  .vstatus-applied      { background: rgba(162,155,254,.15); color: #a29bfe; }
  .vstatus-interview    { background: rgba(255,165,2,.15);  color: var(--yellow); }
  .vstatus-rejected     { background: var(--danger-bg);     color: var(--red); }
  .vstatus-not_suitable { background: rgba(120,120,120,.15); color: var(--muted); }

  .card-actions {
    display: flex; gap: 2px; position: absolute; top: 8px; right: 8px;
  }
  .btn-icon {
    width: 30px; height: 30px; border: none; background: transparent;
    color: var(--muted); font-size: 1rem; cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .btn-icon:hover { background: var(--border); color: var(--text); }
  .btn-del:hover  { background: var(--danger-bg); color: var(--danger); }
  .btn-del:active { transform: scale(.9); }

  .chevron {
    flex-shrink: 0; width: 20px; display: flex; align-items: center;
    justify-content: center; font-size: 0.6rem; color: var(--muted);
    transition: transform .25s; align-self: center;
  }
  .card.open .chevron { transform: rotate(180deg); }

  .card-panel { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .card.open .card-panel { max-height: 420px; }

  .panel-inner { padding: 0 12px 12px; border-top: 1px solid var(--border); }
  .panel-label {
    font-size: 0.68rem; color: var(--accent); font-weight: 600;
    margin: 10px 0 4px; text-transform: uppercase; letter-spacing: .5px;
  }
  .panel-text { font-size: 0.8rem; line-height: 1.5; color: var(--text); }
  .panel-no-analysis { font-size: 0.78rem; color: var(--muted); font-style: italic; padding: 8px 0; }

  /* Status selector in panel */
  .status-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .ss-btn {
    font-size: 0.68rem; padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .ss-btn:hover { border-color: var(--accent); color: var(--text); }
  .ss-btn.active-new          { background: rgba(0,168,255,.2);   color: #00a8ff;       border-color: #00a8ff; }
  .ss-btn.active-applied      { background: rgba(162,155,254,.2); color: #a29bfe;       border-color: #a29bfe; }
  .ss-btn.active-interview    { background: rgba(255,165,2,.2);   color: var(--yellow); border-color: var(--yellow); }
  .ss-btn.active-rejected     { background: var(--danger-bg);     color: var(--red);    border-color: var(--red); }
  .ss-btn.active-not_suitable { background: rgba(120,120,120,.2); color: var(--muted);  border-color: var(--muted); }

  .comment-area {
    width: 100%; margin-top: 10px; padding: 8px 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.78rem;
    font-family: inherit; line-height: 1.5; resize: vertical;
    min-height: 60px; outline: none; transition: border-color .2s;
  }
  .comment-area::placeholder { color: var(--muted); }
  .comment-area:focus { border-color: var(--accent); }
  .comment-saved { font-size: 0.65rem; color: var(--green); margin-top: 3px; opacity: 0; transition: opacity .3s; }
  .comment-saved.show { opacity: 1; }

  .card.deleting { opacity: 0; max-height: 0; margin: 0; border: 0; transition: all .3s; }
  .card.selected { border-color: var(--accent); }

  /* Checkbox */
  .card-checkbox {
    flex-shrink: 0; width: 18px; height: 18px;
    border: 2px solid var(--border); border-radius: 4px;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    align-self: center; transition: all .15s;
  }
  .card-checkbox:hover { border-color: var(--accent); }
  .card-checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .card-checkbox.checked::after { content: '✓'; color: #fff; font-size: 0.7rem; font-weight: 700; }

  /* Bulk action bar */
  .bulk-bar {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: #1e1e2e; border: 1px solid var(--accent);
    border-radius: 12px; padding: 10px 16px;
    display: none; align-items: center; gap: 10px;
    box-shadow: 0 4px 24px rgba(108,99,255,.3); z-index: 20;
    white-space: nowrap;
  }
  .bulk-bar.visible { display: flex; }
  .bulk-count { font-size: 0.8rem; color: var(--text); font-weight: 600; }
  .bulk-btn {
    font-size: 0.72rem; padding: 5px 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--muted); cursor: pointer; transition: all .2s;
  }
  .bulk-btn:hover { border-color: var(--accent); color: var(--text); }
  .bulk-btn-del { border-color: var(--danger); color: var(--danger); }
  .bulk-btn-del:hover { background: var(--danger-bg); }
  .bulk-clear { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; }
  .bulk-clear:hover { color: var(--text); }

  /* Status dropdown in bulk bar */
  .bulk-status-wrap { position: relative; }
  .bulk-status-dropdown {
    position: absolute; bottom: 100%; left: 0; margin-bottom: 6px;
    background: #1e1e2e; border: 1px solid var(--border);
    border-radius: 8px; padding: 4px; display: none; flex-direction: column;
    gap: 2px; min-width: 180px; box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .bulk-status-dropdown.open { display: flex; }
  .bsd-btn {
    font-size: 0.72rem; padding: 6px 10px; border-radius: 5px;
    border: none; background: transparent; color: var(--text);
    cursor: pointer; text-align: left; transition: background .15s;
  }
  .bsd-btn:hover { background: var(--border); }

  .status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 8px; text-align: center; font-size: 0.72rem; color: var(--muted); z-index: 10;
  }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot-ok  { background: var(--green); }
  .dot-err { background: var(--red); }

  .empty { color: var(--muted); text-align: center; padding: 40px 0; font-size: .9rem; }

  /* Create status modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; width: min(320px, 90vw);
  }
  .modal-title { font-size: .9rem; font-weight: 600; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-label { font-size: .68rem; color: var(--muted); margin-bottom: 4px; }
  .modal-input {
    width: 100%; padding: 8px 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: .8rem;
    font-family: inherit; outline: none; transition: border-color .2s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-color-row { display: flex; gap: 8px; align-items: center; }
  .modal-color {
    width: 36px; height: 36px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--border); padding: 2px; background: var(--panel); flex-shrink: 0;
  }
  .modal-color-preview {
    flex: 1; height: 36px; border-radius: 6px;
    border: 1px solid var(--border); transition: background .1s;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-btn {
    font-size: .75rem; padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel);
    color: var(--text); cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .modal-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn:hover:not(.modal-btn-primary) { border-color: var(--accent); }

  @media (min-width: 600px) {
    html { zoom: 1.3; }
    body { padding: 20px 20px 60px; max-width: 900px; }
    header h1 { font-size: 1.4rem; }
    .card-header { padding: 14px 16px; }
    .panel-inner { padding: 0 16px 14px; }
    .card-title { font-size: .9rem; }
  }
</style>
</head>
<body>

<header>
  <h1 id="pageTitle">Вакансії</h1>
  <div class="meta" id="meta"></div>
</header>

<div class="top-actions">
  <button class="export-btn" onclick="exportCSV()">⬇ Експорт CSV</button>
</div>

<div class="filter-group-label">Оцінка</div>
<div class="filters" id="filters"></div>

<div class="filter-group-label">Статус</div>
<div class="status-filters" id="statusFilters"></div>

<div class="toolbar">
  <div class="sort-group">
    <span class="sort-label">Sort:</span>
    <button class="sort-btn active" onclick="setSort('default')">Default</button>
    <button class="sort-btn" onclick="setSort('score')">Score ↓</button>
    <button class="sort-btn" onclick="setSort('date')">Date ↓</button>
  </div>
  <input class="search-box" type="text" id="searchBox" placeholder="Пошук..." oninput="onSearch(this.value)">
</div>
<div id="app"></div>

<div class="bulk-bar" id="bulkBar">
  <span class="bulk-count" id="bulkCount">0 обрано</span>
  <div class="bulk-status-wrap">
    <button class="bulk-btn" onclick="toggleBulkStatusDropdown()">Змінити статус ▲</button>
    <div class="bulk-status-dropdown" id="bulkStatusDropdown"></div>
  </div>
  <button class="bulk-btn bulk-btn-del" onclick="bulkDelete()">Видалити</button>
  <button class="bulk-clear" onclick="clearSelection()" title="Скасувати">✕</button>
</div>

<div class="status-bar" id="statusBar">
  <span class="dot dot-ok"></span> Підключено
</div>

<!-- Create status modal -->
<div class="modal-overlay" id="createStatusModal" onclick="closeCreateModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Новий статус</div>
    <div class="modal-field">
      <div class="modal-label">Назва</div>
      <input class="modal-input" id="newStatusLabel" type="text" placeholder="Наприклад: Тестове завдання" onkeydown="if(event.key==='Enter')createStatus()">
    </div>
    <div class="modal-field">
      <div class="modal-label">Колір</div>
      <div class="modal-color-row">
        <input class="modal-color" id="newStatusColor" type="color" value="#fd79a8" oninput="updateColorPreview(this.value)">
        <div class="modal-color-preview" id="colorPreview" style="background:#fd79a8"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeCreateModal()">Скасувати</button>
      <button class="modal-btn modal-btn-primary" onclick="createStatus()">Створити</button>
    </div>
  </div>
</div>

<script>
const appEl = document.getElementById('app');
const filtersEl = document.getElementById('filters');
const statusFiltersEl = document.getElementById('statusFilters');
const REFRESH = 30000;
const SKIP = ['Пошукові запити для самостійного моніторингу'];

let allData = [];
let allStatuses = {};
let activeFilter = 'all';
let activeStatusFilter = 'all';
let activeSort = 'default';
let searchQuery = '';
let openCards = new Set();
let selectedUrls = new Set();

function hexToRgb(hex) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? `${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)}` : null;
}

function needsDark(hex) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return false;
  const [r,g,b] = [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)];
  return (r*299 + g*587 + b*114) / 1000 > 128;
}

function injectStatusStyles() {
  let css = '';
  for (const [key, s] of Object.entries(allStatuses)) {
    if (s.builtin) continue;
    const rgb = hexToRgb(s.color);
    if (!rgb) continue;
    css += `.vstatus-${key}{background:rgba(${rgb},.15);color:${s.color}}\n`;
    css += `.ss-btn.active-${key}{background:rgba(${rgb},.2);color:${s.color};border-color:${s.color}}\n`;
    css += `.sf-btn[data-sf="${key}"].active{background:${s.color};border-color:${s.color};color:${needsDark(s.color)?'#111':'#fff'}}\n`;
  }
  let el = document.getElementById('dynamicStyles');
  if (!el) { el = document.createElement('style'); el.id = 'dynamicStyles'; document.head.appendChild(el); }
  el.textContent = css;
}

async function loadStatuses() {
  try {
    const r = await fetch('/api/statuses');
    allStatuses = await r.json();
    injectStatusStyles();
  } catch(e) { console.error(e); }
}

function renderBulkStatusDropdown() {
  document.getElementById('bulkStatusDropdown').innerHTML =
    Object.entries(allStatuses).map(([key, s]) =>
      `<button class="bsd-btn" onclick="bulkSetStatus('${key}')">${s.label}</button>`
    ).join('');
}

function getSeenUrls() {
  try { return new Set(JSON.parse(localStorage.getItem('seenUrls') || '[]')); }
  catch { return new Set(); }
}
function markSeen(url) {
  const seen = getSeenUrls();
  seen.add(url);
  localStorage.setItem('seenUrls', JSON.stringify([...seen]));
}
function isNewSeen(url) { return !getSeenUrls().has(url); }

async function load() {
  try {
    await loadStatuses();
    const r = await fetch('/api/vacancies');
    allData = await r.json();
    renderBulkStatusDropdown();
    renderFilters();
    renderStatusFilters();
    render();
    status('ok');
  } catch(e) { status('err'); }
}

function renderFilters() {
  const counts = {all:0, hot:0, ok:0, skip:0, new:0};
  for (const s of allData) {
    if (SKIP.includes(s.name)) continue;
    for (const v of s.items) {
      counts.all++;
      if (isNewSeen(v.url)) counts.new++;
      if (v.score >= 6) counts.hot++;
      else if (v.score >= 4) counts.ok++;
      else if (v.score !== null) counts.skip++;
    }
  }
  filtersEl.innerHTML = `
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Всі ${counts.all}</button>
    <button class="filter-btn ${activeFilter==='new'?'active':''}" onclick="setFilter('new')">Непереглянуті ${counts.new}</button>
    <button class="filter-btn ${activeFilter==='hot'?'active':''}" onclick="setFilter('hot')">Hot ${counts.hot}</button>
    <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')">OK ${counts.ok}</button>
    <button class="filter-btn ${activeFilter==='skip'?'active':''}" onclick="setFilter('skip')">Skip ${counts.skip}</button>
  `;
}

function renderStatusFilters() {
  const counts = {all: 0};
  for (const key of Object.keys(allStatuses)) counts[key] = 0;
  for (const s of allData) {
    if (SKIP.includes(s.name)) continue;
    for (const v of s.items) {
      counts.all++;
      const vs = v.vacancy_status || 'new';
      if (counts[vs] !== undefined) counts[vs]++;
      else counts[vs] = 1;
    }
  }

  let html = `<button class="sf-btn ${activeStatusFilter==='all'?'active':''}" data-sf="all" onclick="setStatusFilter('all')">Всі ${counts.all}</button>`;

  for (const [key, s] of Object.entries(allStatuses)) {
    const count = counts[key] || 0;
    if (s.builtin) {
      html += `<button class="sf-btn ${activeStatusFilter===key?'active':''}" data-sf="${key}" onclick="setStatusFilter('${key}')">${s.label} ${count}</button>`;
    } else {
      html += `<button class="sf-btn sf-btn-custom ${activeStatusFilter===key?'active':''}" data-sf="${key}" onclick="setStatusFilter('${key}')">
        ${esc(s.label)} ${count}
        <span class="sf-btn-del" onclick="event.stopPropagation();deleteStatus('${key}')" title="Видалити статус">✕</span>
      </button>`;
    }
  }

  html += `<button class="sf-btn-add" onclick="openCreateModal()" title="Створити статус">+</button>`;
  statusFiltersEl.innerHTML = html;
}

function setFilter(f) { activeFilter = f; renderFilters(); render(); }
function setStatusFilter(f) { activeStatusFilter = f; renderStatusFilters(); render(); }

function setSort(s) {
  activeSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sort-btn[onclick="setSort('${s}')"]`).classList.add('active');
  render();
}

function onSearch(q) { searchQuery = q.toLowerCase().trim(); render(); }

function parseDate(v) {
  const d = v.published || v.date || '';
  if (!d) return 0;
  const parts = d.split('.');
  if (parts.length === 2) return parseInt(parts[1]) * 100 + parseInt(parts[0]);
  if (parts.length === 3) return parseInt(parts[2]) * 10000 + parseInt(parts[1]) * 100 + parseInt(parts[0]);
  return 0;
}

function sortItems(items) {
  if (activeSort === 'default') return items;
  const sorted = [...items];
  if (activeSort === 'score') sorted.sort((a,b) => (b.score??-1)-(a.score??-1));
  else if (activeSort === 'date') sorted.sort((a,b) => parseDate(b)-parseDate(a));
  return sorted;
}

function matchesSearch(v) {
  if (!searchQuery) return true;
  return [v.title,v.type,v.summary,v.salary,v.remote].join(' ').toLowerCase().includes(searchQuery);
}

function passFilter(v) {
  if (activeFilter === 'new') return isNewSeen(v.url);
  if (activeFilter === 'hot') return v.score >= 6;
  if (activeFilter === 'ok')  return v.score >= 4 && v.score < 6;
  if (activeFilter === 'skip') return v.score !== null && v.score < 4;
  return true;
}

function passStatusFilter(v) {
  if (activeStatusFilter === 'all') return true;
  return (v.vacancy_status || 'new') === activeStatusFilter;
}

function scoreClass(s) {
  if (s === null || s === undefined) return 'score-none';
  if (s >= 6) return 'score-high';
  if (s >= 4) return 'score-mid';
  return 'score-low';
}

function vstatusTag(vs) {
  const s = allStatuses[vs];
  const label = s ? s.label : vs;
  return `<span class="vstatus vstatus-${vs}">${label}</span>`;
}

function render() {
  let html = '';
  let total = 0;

  for (const section of allData) {
    if (SKIP.includes(section.name)) continue;
    const filtered = sortItems(
      section.items.filter(v => passFilter(v) && passStatusFilter(v) && matchesSearch(v))
    );
    if (!filtered.length) continue;
    total += filtered.length;

    html += `<div class="section">
      <div class="section-hdr">${esc(section.name)}<span class="section-count">${filtered.length}</span></div>`;

    for (const v of filtered) {
      const sc = v.score !== null && v.score !== undefined ? v.score + '/10' : '?';
      const isOpen = openCards.has(v.url);
      const vs = v.vacancy_status || 'new';
      const isSelected = selectedUrls.has(v.url);

      html += `
      <div class="card ${isOpen?'open':''} ${isSelected?'selected':''}" data-url="${escA(v.url)}" data-vstatus="${vs}">
        <div class="card-header" onclick="toggle(this)">
          <div class="card-checkbox ${isSelected?'checked':''}" onclick="event.stopPropagation();toggleSelect(this)"></div>
          <div class="score-badge ${scoreClass(v.score)}">${sc}</div>
          <div class="card-info">
            <a class="card-title" href="${escA(v.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(v.title)}</a>
            <div class="card-meta">
              ${vstatusTag(vs)}
              ${v.type ? `<span class="tag">${esc(v.type)}</span>` : ''}
              ${v.remote ? `<span class="tag">${esc(v.remote)}</span>` : ''}
              ${v.salary && v.salary !== 'Не вказана' ? `<span class="tag tag-salary">${esc(v.salary)}</span>` : ''}
              ${v.date ? `<span class="tag tag-date">${esc(v.date)}</span>` : ''}
              ${isNewSeen(v.url) ? '<span class="tag tag-seen-new">непереглянута</span>' : ''}
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-icon btn-del" onclick="event.stopPropagation();del(this)" title="Видалити">✕</button>
          </div>
        </div>
        <div class="card-panel">
          <div class="panel-inner">
            <div class="panel-label">Статус</div>
            <div class="status-selector">
              ${Object.entries(allStatuses).map(([key, s]) =>
                `<button class="ss-btn ${vs===key?'active-'+key:''}" onclick="setVacancyStatus(this,'${key}')">${esc(s.label)}</button>`
              ).join('')}
            </div>
            <div class="panel-label" style="margin-top:12px">Коментар</div>
            <textarea class="comment-area" placeholder="Залиш нотатку про цю вакансію..." onblur="saveComment(this)">${esc(v.comment||'')}</textarea>
            <div class="comment-saved">Збережено</div>
            ${v.summary
              ? `<div class="panel-label" style="margin-top:12px">Аналіз</div><div class="panel-text">${esc(v.summary)}</div>`
              : '<div class="panel-no-analysis" style="margin-top:8px">Аналіз ще не проведено</div>'
            }
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  if (!total) html = '<div class="empty">Нічого не знайдено</div>';
  appEl.innerHTML = html;
  document.getElementById('meta').textContent =
    `Всього: ${total} · Оновлено: ${new Date().toLocaleTimeString('uk-UA')}`;
}

function toggle(hdr) {
  const card = hdr.closest('.card');
  const url = card.dataset.url;
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    openCards.add(url);
    if (isNewSeen(url)) {
      markSeen(url);
      const t = card.querySelector('.tag-seen-new');
      if (t) t.remove();
      renderFilters();
    }
  } else {
    openCards.delete(url);
  }
}

async function setVacancyStatus(btn, newStatus) {
  const card = btn.closest('.card');
  const url = card.dataset.url;
  try {
    const r = await fetch('/api/vacancies/status', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, status: newStatus})
    });
    if (r.ok) {
      card.dataset.vstatus = newStatus;
      const badge = card.querySelector('.vstatus');
      if (badge) {
        badge.className = `vstatus vstatus-${newStatus}`;
        badge.textContent = allStatuses[newStatus]?.label || newStatus;
      }
      card.querySelectorAll('.ss-btn').forEach(b => b.className = 'ss-btn');
      btn.className = `ss-btn active-${newStatus}`;
      renderStatusFilters();
    }
  } catch(e) { console.error(e); }
}

async function saveComment(textarea) {
  const card = textarea.closest('.card');
  const url = card.dataset.url;
  const comment = textarea.value.trim();
  try {
    await fetch('/api/vacancies/comment', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, comment})
    });
    const saved = textarea.nextElementSibling;
    saved.classList.add('show');
    setTimeout(() => saved.classList.remove('show'), 2000);
  } catch(e) { console.error(e); }
}

async function del(btn) {
  const card = btn.closest('.card');
  const url = card.dataset.url;
  if (!confirm('Видалити вакансію?')) return;
  card.classList.add('deleting');
  openCards.delete(url);
  try {
    const r = await fetch('/api/vacancies', {
      method:'DELETE', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });
    if (r.ok) setTimeout(load, 350);
    else { card.classList.remove('deleting'); alert('Помилка'); }
  } catch(e) { card.classList.remove('deleting'); alert('Нема зв\'язку'); }
}

function toggleSelect(checkbox) {
  const card = checkbox.closest('.card');
  const url = card.dataset.url;
  if (selectedUrls.has(url)) {
    selectedUrls.delete(url);
    checkbox.classList.remove('checked');
    card.classList.remove('selected');
  } else {
    selectedUrls.add(url);
    checkbox.classList.add('checked');
    card.classList.add('selected');
  }
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const count = document.getElementById('bulkCount');
  if (selectedUrls.size > 0) {
    bar.classList.add('visible');
    count.textContent = `${selectedUrls.size} обрано`;
  } else {
    bar.classList.remove('visible');
    document.getElementById('bulkStatusDropdown').classList.remove('open');
  }
}

function clearSelection() {
  selectedUrls.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.card-checkbox.checked').forEach(c => c.classList.remove('checked'));
  updateBulkBar();
}

function toggleBulkStatusDropdown() {
  document.getElementById('bulkStatusDropdown').classList.toggle('open');
}

async function bulkSetStatus(newStatus) {
  document.getElementById('bulkStatusDropdown').classList.remove('open');
  const urls = [...selectedUrls];
  await Promise.all(urls.map(url =>
    fetch('/api/vacancies/status', {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, status: newStatus})
    })
  ));
  clearSelection();
  await load();
}

async function bulkDelete() {
  if (!confirm(`Видалити ${selectedUrls.size} вакансій?`)) return;
  const urls = [...selectedUrls];
  await Promise.all(urls.map(url =>
    fetch('/api/vacancies', {
      method: 'DELETE', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    })
  ));
  clearSelection();
  await load();
}

function exportCSV() {
  window.location.href = '/api/export';
}

function status(s) {
  const sb = document.getElementById('statusBar');
  sb.innerHTML = s === 'ok'
    ? '<span class="dot dot-ok"></span> Підключено'
    : '<span class="dot dot-err"></span> Немає зв\'язку';
}

// Modal
function openCreateModal() {
  document.getElementById('newStatusLabel').value = '';
  const color = document.getElementById('newStatusColor').value;
  document.getElementById('colorPreview').style.background = color;
  document.getElementById('createStatusModal').classList.add('open');
  setTimeout(() => document.getElementById('newStatusLabel').focus(), 50);
}

function closeCreateModal(e) {
  if (!e || e.target === document.getElementById('createStatusModal')) {
    document.getElementById('createStatusModal').classList.remove('open');
  }
}

function updateColorPreview(color) {
  document.getElementById('colorPreview').style.background = color;
}

async function createStatus() {
  const label = document.getElementById('newStatusLabel').value.trim();
  const color = document.getElementById('newStatusColor').value;
  if (!label) {
    document.getElementById('newStatusLabel').focus();
    return;
  }
  try {
    const r = await fetch('/api/statuses', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({label, color})
    });
    if (r.ok) {
      closeCreateModal();
      await loadStatuses();
      renderBulkStatusDropdown();
      renderStatusFilters();
      render();
    }
  } catch(e) { console.error(e); }
}

async function deleteStatus(key) {
  if (!confirm(`Видалити статус? Всі вакансії з цим статусом отримають статус "New".`)) return;
  try {
    const r = await fetch(`/api/statuses/${key}`, {method: 'DELETE'});
    if (r.ok) {
      if (activeStatusFilter === key) activeStatusFilter = 'all';
      await load();
    }
  } catch(e) { console.error(e); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCreateModal();
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escA(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

fetch('/api/config').then(r=>r.json()).then(cfg=>{
  if (cfg.title) { document.getElementById('pageTitle').textContent = cfg.title; document.title = cfg.title; }
});

load();
setInterval(load, REFRESH);
</script>
</body>
</html>
